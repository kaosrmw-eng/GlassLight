version: 1.0.0
# Peripherals Configuration — XIAO ESP32-C6
# GPIO8 = onboard WS2812 RGB LED
# C6 RMT does not support DMA, so with_dma: false

peripherals:
  - name: rmt_tx
    type: rmt
    role: tx
    config:
      gpio_num: 8
      clk_src: RMT_CLK_SRC_DEFAULT
      resolution_hz: 10000000
      mem_block_symbols: 64
      trans_queue_depth: 4
      intr_priority: 1
      flags:
        invert_out: false
        with_dma: false
        io_loop_back: false
        io_od_mode: false
        allow_pd: false
        init_level: false
